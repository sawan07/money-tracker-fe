<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Money Tracker</title>
    <link rel="stylesheet" href="assets/style.css?v=3">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">Money Tracker</div>
            <button class="burger" id="burgerBtn">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="analytics.html">Analytics</a></li>
                <li><a href="transactions.html">Transactions</a></li>
            </ul>
        </div>
    </nav>

    <!-- Add near top of body -->
    <div id="lockOverlay" style="display:none">
        <div id="lockBox">
            <h2>Unlock Money Tracker</h2>
            <p>Use Face ID / Touch ID to unlock</p>
            <button id="registerBtn">Enable Biometric Unlock</button>
            <button id="unlockBtn">Unlock</button>
        </div>
    </div>

    <div id="progressBar"></div>

    <h1>Money Tracker</h1>
    <p class="subtitle">Track expenses, earnings, and stay on top of your monthly cash flow.</p>

    <div id="balanceContainer">
        Remaining: <span id="remainingBalance">£0.00</span>
        <button id="refreshBalanceBtn" class="refresh-btn">🔄</button>
    </div>


    <!-- Month Selector -->
    <label>Select Month:
        <select id="monthSelect"></select>
    </label>

    <!-- Expense Form -->
    <h2>Add Expense</h2>
    <form id="expenseForm">
        <label>Date: <input type="date" name="date" required></label>
        <label>Category:
            <select name="category" required>
                <option>Grocery</option>
                <option>Takeaway</option>
                <option>BDT_transfer</option>
                <option>Transport</option>
                <option>Shopping</option>
                <option>saving</option>
                <option>projucti/prologic</option>
                <option>Medical</option>
                <option>Loan Paid</option>
                <option>Flight</option>
                <option>Paypal</option>
                <option>Entertainment</option>
                <option>Driving</option>
                <option>Investment</option>
                <option>other</option>
            </select>
        </label>
        <label>Amount: <input type="number" step="0.01" name="amount" required></label>
        <label>Notes: <textarea name="notes"></textarea></label>
        <button type="submit">Add Expense</button>
        <div class="message"></div>
    </form>

    <!-- Earning Form -->
    <h2>Add Earning</h2>
    <form id="earningForm">
        <label>Date: <input type="date" name="date" required></label>
        <label>Source:
            <select name="source" required>
                <option>V1</option>
                <option>Nayma</option>
                <option>Prologic</option>
                <option>Projucti</option>
                <option>Loan taken</option>
                <option>Loan returned</option>
                <option>From Savings</option>
                <option>Other</option>
            </select>
        </label>
        <label>Amount: <input type="number" step="0.01" name="amount" required></label>
        <label>Notes: <textarea name="notes"></textarea></label>
        <button type="submit">Add Earning</button>
        <div class="message"></div>
    </form>

    <!-- Scripts -->
    <script src="js/app.js?v=2"></script>
    <script src="js/expense.js?v=2"></script>
    <script src="js/earning.js?v=2"></script>
    <script src="js/biometric.js?v=2"></script>
    <script src="js/nav.js?v=2"></script>
</body>

</html>
