<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Analytics - Money Tracker</title>
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https://script.google.com https://script.googleusercontent.com https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline';">

    <link rel="stylesheet" href="assets/style.css?v=4">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">Money Tracker</div>
            <button class="burger" id="burgerBtn">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="analytics.html">Analytics</a></li>
                <li><a href="transactions.html">Transactions</a></li>
            </ul>
        </div>
    </nav>

    <div id="lockOverlay" style="display:none">
        <div id="lockBox">
            <h2>Unlock Analytics</h2>
            <p>Use Face ID / Touch ID to unlock</p>
            <button id="unlockBtn">Unlock</button>
        </div>
    </div>

    <h1>Spending Analytics</h1>
    <p class="subtitle">Visualize your monthly spending patterns by category and trend.</p>

    <div class="chart-card">
        <h3>Category Breakdown</h3>
        <label>Select Month:</label>
        <select id="pieMonthSelect"></select>
        <div class="pie-chart-layout">
            <div class="pie-canvas-wrap">
                <canvas id="categoryPieChart"></canvas>
            </div>
            <div id="pieLegend" class="chart-legend" aria-label="Category spending legend"></div>
        </div>
    </div>

    <div class="chart-card">
        <h3>Monthly Spending Trend</h3>
        <label>Filter by Category:</label>
        <select id="trendCategorySelect">
            <option value="Total">Total Spending</option>
        </select>
        <canvas id="trendLineChart"></canvas>
    </div>

    <script src="js/nav.js?v=2"></script>
    <script src="js/app.js?v=2"></script>
    <script src="js/biometric.js?v=2"></script>
    <script src="js/analytics.js?v=3"></script>
</body>

</html>
